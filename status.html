<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title style="color: #003399;">Epicenter 5G WiFi Status</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #003399;
            font-family: Arial, sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 1.0);
            border-radius: 10px;
            padding: 20px;
            margin: 3% auto;
            width: 75%;
            max-width: 450px;
            backdrop-filter: blur(1px);
        }

        .insert {
            text-align: center;
        }

        img {
            width: 100%;
        }

        big-red {
            color: #003399;
            font-size: 1.2em;
            font-weight: bold;
        }

        italic-black {
            color: #003399;
            font-style: italic;
        }

        hr {
            border: 1px solid #003399;
            margin: 20px 0;
        }

        copy-right {
            color: #003399;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="insert">
            <br>
            <img src="images/epicenter.png" alt="You are already logged in to Epicenter's 5G WiFi and have access to the Internet.">
            <hr>
            <big-red>You are already logged in to <span style="color: #003399;">Epicenter's</span> 5G WiFi and have access to the Internet.</big-red>
            <hr>
            <italic-black>You can use your Browser, Email and other network Apps as you normally would.</italic-black>
            <hr>
        </div>
    </div>
</body>

</html>
